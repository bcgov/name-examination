name: NAME-EXAMINATION UI CI

on:
  pull_request:
    types: [assigned, synchronize]
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: ./

jobs:
  nameexamination-ci:
    uses: bcgov/bcregistry-sre/.github/workflows/frontend-ci.yaml@main
    with:
      node_version: '24.x'
      pnpm_version: '10.28.1'
      app_name: "nameexamination"
      working_directory: "./app"
      codecov_flag: ""
